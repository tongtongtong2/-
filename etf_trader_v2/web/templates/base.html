{% set nav = nav or 'home' %}
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ETF Trader V2{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="{{ url_for('home') }}">📈 ETF Trader V2</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain"
            aria-controls="navbarMain" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarMain">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link {% if nav == 'home' %}active{% endif %}" href="{{ url_for('home') }}">🏠 首页</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if nav == 'signals' %}active{% endif %}" href="{{ url_for('signals_page') }}">📡 信号</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if nav == 'history' %}active{% endif %}" href="{{ url_for('history_page') }}">📜 历史</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if nav == 'stats' %}active{% endif %}" href="{{ url_for('stats_page') }}">📊 统计</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if nav == 'stocks' %}active{% endif %}" href="{{ url_for('stocks_page') }}">⭐ 精选</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if nav == 'portfolio' %}active{% endif %}" href="{{ url_for('portfolio_page') }}">💼 持仓</a>
        </li>
      </ul>
      <span class="navbar-text small text-warning">仅供研究学习，不构成投资建议</span>
    </div>
  </div>
</nav>

<main class="container-fluid py-4">
  {% block content %}{% endblock %}
</main>

<footer class="text-center text-muted small py-4">
  © 2026 ETF Trader V2 · Flask + SQLite + Pure Python Indicators
</footer>

<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
